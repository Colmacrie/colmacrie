<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colin W. Macrie | Astrophysics</title>

  <style>
    :root {
      --bg: #0a0d14;
      --bg-soft: #111522;
      --panel: rgba(14, 18, 30, 0.9);
      --panel-2: rgba(10, 14, 24, 0.84);
      --text: #eef2ff;
      --muted: #a6b0c8;
      --accent: #8ec5ff;
      --border: rgba(255, 255, 255, 0.1);
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.35);
      --maxw: 1580px;
      --gap: 1rem;
      --left-col: 600px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background:
        linear-gradient(rgba(5, 8, 16, 0.7), rgba(5, 8, 16, 0.92)),
        url('images/background.jpg') center top / cover fixed no-repeat;
      color: var(--text);
      line-height: 1.65;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .page-wrap {
      width: min(var(--maxw), calc(100% - 2rem));
      margin: 0 auto;
      padding: 1rem 0 2rem;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(300px, var(--left-col)) minmax(0, 1fr);
      gap: var(--gap);
      align-items: start;
    }

    .sidebar {
      position: sticky;
      top: 1rem;
    }

    .hero-card {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      padding: 2.5rem 2rem;
      text-align: center;
    }

    .headshot {
      width: 180px;
      height: 180px;
      object-fit: cover;
      border-radius: 10%;
      border: 4px solid rgba(255, 255, 255, 0.13);
      margin-bottom: 1.25rem;
      background: var(--bg-soft);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }

    .name {
      font-size: clamp(2.2rem, 3vw, 3.2rem);
      line-height: 1.05;
      margin-bottom: 0.55rem;
      font-weight: 700;
    }

    .role {
      color: var(--muted);
      font-size: 1.05rem;
      margin-bottom: 1rem;
    }

    .intro {
      margin: 0 auto 1.4rem;
      color: var(--muted);
      font-size: 1rem;
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1.4rem;
    }

    .btn {
      display: inline-block;
      padding: 0.8rem 1.1rem;
      border-radius: 8px;
      font-weight: 700;
      border: 1px solid var(--border);
      transition: transform 0.2s ease, opacity 0.2s ease, background 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      text-decoration: none;
      opacity: 0.96;
    }

    .btn-primary {
      background: var(--accent);
      color: #07101c;
      border: none;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
    }

    .content-column {
      min-width: 0;
    }

    .section {
      width: 100%;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
      padding: 2rem 2rem;
    }

    .section h2 {
      font-size: 1.65rem;
      margin-bottom: 0.75rem;
    }

    .section p {
      color: var(--muted);
      max-width: 90ch;
    }

    footer {
      width: min(var(--maxw), calc(100% - 2rem));
      margin: 1rem auto 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 950px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
      }

      .hero-card {
        padding: 2.25rem 1.5rem;
      }
    }

    @media (max-width: 700px) {
      .page-wrap {
        width: min(var(--maxw), calc(100% - 1rem));
        padding-top: 0.75rem;
      }

      .hero-card {
        padding: 2rem 1.2rem;
        border-radius: 8px;
      }

      .section {
        padding: 1.5rem 1.2rem;
        border-radius: 8px;
      }

      .headshot {
        width: 145px;
        height: 145px;
      }
    }
  </style>
</head>

<body>
  <div class="page-wrap">
    <div class="layout">

      <aside class="sidebar">
        <section class="hero-card">
          <img src="images/headshot.png" alt="Headshot" class="headshot" />

          <h1 class="name">Colin W. Macrie</h1>
          <p class="role">Astrophysics | NSF GRFP Fellow</p>

          <p class="intro">
            I study thermonuclear supernovae via observations and modelling at Purdue University, as part of
            Prof. Abigail Polin's transient research group.
          </p>

          <div class="button-row">
            <a class="btn btn-primary" href="documents/Macrie-CV-Spring-2026.pdf" target="_blank">View CV</a>
            <a class="btn btn-secondary" href="mailto:cmacrie@purdue.edu">Contact</a>
          </div>

        </section>
      </aside>

      <main class="content-column">
        <section class="section">
          <h2>Research</h2>
          <p>
			Under Construction.
          </p>
        </section>
      </main>

    </div>
  </div>

  <footer>
    <p>© 2026 Colin W. Macrie | Built with GitHub Pages</p>
  </footer>
</body>
</html>
